events {}

http {
  upstream web_backend {
    # Change this IP to the VM where the web container runs.
    server 10.0.27.223:8000;
  }

  # Redirect HTTP to HTTPS
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl default_server;
    server_name _;

    # Certificates will be mounted into this directory via Docker Compose
    ssl_certificate /etc/nginx/certs/valid.crt;
    ssl_certificate_key /etc/nginx/certs/valid.key;

    # SSL hardening protocols & ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
